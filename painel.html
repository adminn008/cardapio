<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel KDS - Cozinha</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: #121214; color: #e1e1e6; padding: 15px; min-height: 100vh; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      background: #202024; padding: 15px 20px; border-radius: 12px;
      margin-bottom: 20px; border: 1px solid #29292e; flex-wrap: wrap; gap: 15px;
    }
    .status-painel h1 { font-size: 1.4rem; color: #00875f; }
    .indicadores { display: flex; gap: 12px; align-items: center; }
    .card-info { background: #121214; padding: 8px 15px; border-radius: 8px; border: 1px solid #29292e; }
    .card-info label { display: block; font-size: 0.75rem; color: #8d8d99; }
    .card-info strong { font-size: 1.1rem; color: #00b37e; }

    .btn-som {
      border: none; padding: 10px 15px; border-radius: 6px; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; color: #fff; background: #9b51e0;
    }
    .btn-som.ativo { background: #00875f; }

    .grid-pedidos {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px;
    }

    .card-pedido {
      background: #202024; border-radius: 12px; padding: 15px;
      border: 2px solid #29292e; display: flex; flex-direction: column; justify-content: space-between;
    }
    .pedido-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #29292e; padding-bottom: 10px; margin-bottom: 10px;
    }
    .num-pedido { font-size: 1.2rem; font-weight: 800; color: #fba94c; }
    .hora-pedido { font-size: 0.85rem; color: #8d8d99; background: #121214; padding: 4px 8px; border-radius: 4px; }
    
    .cliente-nome { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .cliente-end { font-size: 0.9rem; color: #c4c4cc; margin-bottom: 8px; }
    
    .itens-lista {
      background: #121214; padding: 10px; border-radius: 8px;
      margin: 10px 0; font-size: 0.95rem; color: #e1e1e6; line-height: 1.5;
    }

    .financeiro-resumo {
      display: flex; justify-content: space-between; font-size: 0.9rem;
      color: #a8a8b3; margin: 10px 0; border-top: 1px dashed #29292e; padding-top: 8px;
    }
    .val-total { color: #00b37e; font-weight: 800; font-size: 1.1rem; }

    .acoes-card { display: flex; gap: 8px; }
    .btn-acao {
      flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: #fff;
    }
    .btn-concluir { background: #00875f; }
    .btn-cancelar { background: #29292e; color: #f75a68; border: 1px solid #da3751; }

    .vazio-msg {
      grid-column: 1 / -1; text-align: center; color: #8d8d99;
      padding: 60px 20px; font-size: 1.1rem; background: #202024; border-radius: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="status-painel">
      <h1>📺 Cozinha KDS (Local)</h1>
    </div>
    <div class="indicadores">
      <button class="btn-som" id="btn-som" onclick="ativarSom()">🔇 Ativar Alerta Sonoro</button>
      <div class="card-info">
        <label>Total do Turno</label>
        <strong id="total-turno">R$ 0,00</strong>
      </div>
    </div>
  </header>

  <main class="grid-pedidos" id="container-pedidos"></main>

  <script>
    const canalPedidos = new BroadcastChannel('canal_kds');
    let somAtivo = false;
    let audioCtx = null;

    function ativarSom() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      somAtivo = true;
      const btn = document.getElementById('btn-som');
      btn.className = "btn-som ativo";
      btn.innerHTML = "🔊 Som Ativado";
    }

    function tocarAlerta() {
      if (!somAtivo || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function carregarDados() {
      const todosPedidos = JSON.parse(localStorage.getItem('pedidos_kds')) || [];
      const container = document.getElementById('container-pedidos');
      
      // Total de vendas
      const total = todosPedidos
        .filter(p => p.status !== 'cancelado')
        .reduce((acc, p) => acc + (p.total || 0), 0);
      
      document.getElementById('total-turno').textContent = 
        total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      // Filtra apenas os ativos para exibir
      const ativos = todosPedidos.filter(p => p.status === 'ativo');

      if (ativos.length === 0) {
        container.innerHTML = `<div class="vazio-msg">🛎️ Nenhum pedido pendente no momento.</div>`;
        return;
      }

      container.innerHTML = "";
      ativos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card-pedido';
        card.innerHTML = `
          <div>
            <div class="pedido-header">
              <span class="num-pedido">#${p.id}</span>
              <span class="hora-pedido">🕒 ${p.hora}</span>
            </div>
            <div class="cliente-nome">${p.cliente}</div>
            <div class="cliente-end">📍 ${p.endereco}</div>
            <div class="itens-lista"><strong>Itens:</strong><br>${p.itens}</div>
            ${p.obs !== 'Nenhuma' ? `<div style="color:#fba94c; font-size:0.85rem;">📝 ${p.obs}</div>` : ''}
          </div>
          <div>
            <div class="financeiro-resumo">
              <span>Total:</span>
              <span class="val-total">R$ ${(p.total || 0).toFixed(2).replace('.', ',')}</span>
            </div>
            <div class="acoes-card">
              <button class="btn-acao btn-concluir" onclick="mudarStatus(${p.id}, 'entregue')">✅ Concluir</button>
              <button class="btn-acao btn-cancelar" onclick="mudarStatus(${p.id}, 'cancelado')">❌ Cancelar</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function mudarStatus(id, novoStatus) {
      let todosPedidos = JSON.parse(localStorage.getItem('pedidos_kds')) || [];
      todosPedidos = todosPedidos.map(p => {
        if (p.id === id) p.status = novoStatus;
        return p;
      });
      localStorage.setItem('pedidos_kds', JSON.stringify(todosPedidos));
      carregarDados();
    }

    // Escuta novas mensagens vindas do cardápio em tempo real
    canalPedidos.onmessage = (e) => {
      if (e.data.acao === 'novo_pedido') {
        tocarAlerta();
        carregarDados();
      }
    };

    carregarDados();
  </script>
</body>
</html>
