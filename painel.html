<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel KDS - Sabor & Cia</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: #121214; color: #e1e1e6; padding: 15px; min-height: 100vh; }

    /* TOPO DO PAINEL */
    header {
      display: flex; justify-content: space-between; align-items: center;
      background: #202024; padding: 15px 20px; border-radius: 12px;
      margin-bottom: 20px; border: 1px solid #29292e; flex-wrap: wrap; gap: 15px;
    }
    .status-painel h1 { font-size: 1.4rem; color: #00875f; display: flex; align-items: center; gap: 8px; }
    .status-painel span { font-size: 0.85rem; color: #a8a8b3; font-weight: normal; }

    /* NAVEGAÇÃO DE ABAS */
    .nav-abas { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn-aba {
      background: #202024; border: 1px solid #29292e; color: #a8a8b3;
      padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;
      font-size: 0.95rem; transition: all 0.2s;
    }
    .btn-aba.ativa { background: #00875f; color: #fff; border-color: #00875f; }

    .indicadores { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .card-info { background: #121214; padding: 8px 15px; border-radius: 8px; border: 1px solid #29292e; }
    .card-info label { display: block; font-size: 0.75rem; color: #8d8d99; }
    .card-info strong { font-size: 1.1rem; color: #00b37e; }

    .btn-acao {
      border: none; padding: 8px 12px; border-radius: 6px; font-weight: 700; font-size: 0.8rem; cursor: pointer; color: #fff;
    }
    .btn-som { background: #9b51e0; }
    .btn-som.ativo { background: #00875f; }
    .btn-zerar { background: #da3751; }

    /* GRID DIVIDIDA PARA VÁRIOS PEDIDOS */
    .grid-pedidos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 15px;
    }

    /* CARD DO PEDIDO */
    .card-pedido {
      background: #202024; border-radius: 12px; padding: 15px;
      border: 2px solid #29292e; display: flex; flex-direction: column;
      justify-content: space-between; position: relative; transition: all 0.3s;
    }

    /* DESTAQUE DE NOVO PEDIDO */
    .card-pedido.novo-pedido {
      border-color: #fba94c;
      box-shadow: 0 0 15px rgba(251, 169, 76, 0.35);
      animation: pulso 2s infinite;
    }
    @keyframes pulso {
      0% { border-color: #fba94c; }
      50% { border-color: #e16e0e; }
      100% { border-color: #fba94c; }
    }

    /* CARD DE FECHAMENTO DE TURNO */
    .card-fechamento {
      grid-column: 1 / -1; background: #221a30; border: 2px dashed #9b51e0;
      border-radius: 12px; padding: 15px 20px; display: flex;
      justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
    }
    .card-fechamento h3 { color: #d4a5ff; font-size: 1.1rem; }
    .card-fechamento span { font-weight: 800; color: #00b37e; font-size: 1.2rem; }

    .pedido-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #29292e; padding-bottom: 10px; margin-bottom: 10px;
    }
    .num-pedido { font-size: 1.2rem; font-weight: 800; color: #fba94c; }
    .hora-pedido { font-size: 0.85rem; color: #8d8d99; background: #121214; padding: 4px 8px; border-radius: 4px; }

    .cliente-info { margin-bottom: 10px; line-height: 1.4; }
    .cliente-nome { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .cliente-end { font-size: 0.9rem; color: #c4c4cc; }
    .cliente-detalhes { font-size: 0.85rem; color: #8d8d99; margin-top: 4px; }

    .itens-lista {
      background: #121214; padding: 10px; border-radius: 8px;
      margin: 10px 0; font-size: 0.95rem; color: #e1e1e6; line-height: 1.5;
    }

    .obs-box {
      background: #29292e; padding: 8px; border-radius: 6px;
      font-size: 0.85rem; color: #fba94c; margin-bottom: 10px;
    }

    .financeiro-resumo {
      display: flex; justify-content: space-between; font-size: 0.9rem;
      color: #a8a8b3; margin-bottom: 12px; border-top: 1px dashed #29292e; padding-top: 8px;
    }
    .val-total { color: #00b37e; font-weight: 800; font-size: 1.1rem; }

    /* BOTOES DE AÇÃO NO CARD */
    .acoes-card { display: flex; gap: 8px; }
    
    .btn-concluir {
      flex: 2; padding: 12px; border: none; border-radius: 8px;
      background: #00875f; color: #fff; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-concluir:hover { background: #00b37e; }
    .btn-concluir.confirmar { background: #e16e0e !important; }

    .btn-cancelar {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      background: #29292e; color: #f75a68; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s; border: 1px solid #da3751;
    }
    .btn-cancelar:hover { background: #da3751; color: #fff; }
    .btn-cancelar.confirmar { background: #da3751 !important; color: #fff !important; }

    .tag-concluido {
      background: #00875f22; color: #00b37e; border: 1px solid #00875f;
      text-align: center; padding: 8px; border-radius: 6px; font-weight: 700; font-size: 0.85rem;
    }
    .tag-cancelado {
      background: #da375122; color: #f75a68; border: 1px solid #da3751;
      text-align: center; padding: 8px; border-radius: 6px; font-weight: 700; font-size: 0.85rem;
    }

    .vazio-msg {
      grid-column: 1 / -1; text-align: center; color: #8d8d99;
      padding: 60px 20px; font-size: 1.1rem; background: #202024; border-radius: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="status-painel">
      <h1>📺 Painel KDS <span>(Cozinha / Gestão)</span></h1>
    </div>
    <div class="indicadores">
      <button class="btn-acao btn-som" id="btn-ativar-som" onclick="ativarSomAlertas()">🔇 Clique p/ Ativar Som</button>
      <div class="card-info">
        <label>Hora Atual</label>
        <strong id="relogio-txt">00:00:00</strong>
      </div>
      <div class="card-info">
        <label>Total do Turno</label>
        <strong id="total-dia-txt">R$ 0,00</strong>
      </div>
      <button class="btn-acao btn-zerar" onclick="finalizarTurno()">🔒 Finalizar Turno</button>
    </div>
  </header>

  <!-- ABAS DE NAVEGAÇÃO -->
  <div class="nav-abas">
    <button class="btn-aba ativa" id="aba-ativos" onclick="mudarAba('ativos')">
      🛎️ Pedidos Ativos (<span id="qtd-ativos">0</span>)
    </button>
    <button class="btn-aba" id="aba-historico" onclick="mudarAba('historico')">
      📜 Histórico do Dia (<span id="qtd-historico">0</span>)
    </button>
  </div>

  <main class="grid-pedidos" id="container-pedidos"></main>

  <script>
    // 1. GERADOR DE SOM SINTETIZADO ("DING-DONG")
    let somHabilitado = false;
    let audioCtx = null;

    function ativarSomAlertas() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      somHabilitado = true;
      const btn = document.getElementById('btn-ativar-som');
      btn.className = "btn-acao btn-som ativo";
      btn.innerHTML = "🔊 Som de Alerta Ativo";
      tocarSomPedido();
    }

    function tocarSomPedido() {
      if (!somHabilitado || !audioCtx) return;

      try {
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(659.25, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.6);

        setTimeout(() => {
          const osc2 = audioCtx.createOscillator();
          const gain2 = audioCtx.createGain();
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(523.25, audioCtx.currentTime);
          gain2.gain.setValueAtTime(0.4, audioCtx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
          osc2.connect(gain2);
          gain2.connect(audioCtx.destination);
          osc2.start();
          osc2.stop(audioCtx.currentTime + 0.9);
        }, 150);
      } catch (err) {}
    }

    // 2. MANTER TELA ACESA (WAKE LOCK)
    async function ativarWakeLock() {
      try {
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
      } catch (err) {}
    }
    ativarWakeLock();
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'visible') ativarWakeLock();
    });

    // 3. RELÓGIO EM TEMPO REAL
    setInterval(() => {
      document.getElementById('relogio-txt').textContent = new Date().toLocaleTimeString('pt-BR');
    }, 1000);

    // 4. ESTADO DOS PEDIDOS E CARREGAMENTO
    let abaAtual = 'ativos';
    let pedidosAtivos = [];
    let historicoPedidos = [];
    let ultimosIdsAtivos = [];

    function carregarDados() {
      const novosAtivos = JSON.parse(localStorage.getItem('pedidos_ativos')) || [];
      historicoPedidos = JSON.parse(localStorage.getItem('historico_pedidos')) || [];

      // Toca o som caso detecte novos pedidos
      if (ultimosIdsAtivos.length > 0) {
        const novosPedidosEntraram = novosAtivos.filter(p => !ultimosIdsAtivos.includes(p.id));
        if (novosPedidosEntraram.length > 0) {
          tocarSomPedido();
        }
      }

      pedidosAtivos = novosAtivos;
      ultimosIdsAtivos = pedidosAtivos.map(p => p.id);
      atualizarContadoresEFaturamento();
    }

    function salvarDados() {
      localStorage.setItem('pedidos_ativos', JSON.stringify(pedidosAtivos));
      localStorage.setItem('historico_pedidos', JSON.stringify(historicoPedidos));
      atualizarContadoresEFaturamento();
    }

    function atualizarContadoresEFaturamento() {
      document.getElementById('qtd-ativos').textContent = pedidosAtivos.length;
      
      const pedidosEntregues = historicoPedidos.filter(p => p.tipo !== 'fechamento' && p.status !== 'cancelado');
      document.getElementById('qtd-historico').textContent = historicoPedidos.filter(p => p.tipo !== 'fechamento').length;

      // Soma apenas pedidos entregues
      const totalVendido = pedidosEntregues.reduce((acc, p) => acc + (parseFloat(p.total) || 0), 0);
      document.getElementById('total-dia-txt').textContent = 
        totalVendido.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function mudarAba(aba) {
      abaAtual = aba;
      document.getElementById('aba-ativos').classList.toggle('ativa', aba === 'ativos');
      document.getElementById('aba-historico').classList.toggle('ativa', aba === 'historico');
      renderizar();
    }

    // 5. RENDERIZAÇÃO
    function renderizar() {
      carregarDados();
      const container = document.getElementById('container-pedidos');
      container.innerHTML = "";

      const listaExibir = abaAtual === 'ativos' ? pedidosAtivos : historicoPedidos;

      if (listaExibir.length === 0) {
        container.innerHTML = `<div class="vazio-msg">
          ${abaAtual === 'ativos' ? '🛎️ Nenhum pedido pendente no momento.' : '📜 Nenhum pedido no histórico ainda.'}
        </div>`;
        return;
      }

      listaExibir.forEach((p, index) => {
        // Card de Fechamento de Turno
        if (p.tipo === 'fechamento') {
          const cardFechamento = document.createElement('div');
          cardFechamento.className = 'card-fechamento';
          cardFechamento.innerHTML = `
            <div>
              <h3>📅 TURNO FINALIZADO - ${p.data} (${p.hora})</h3>
              <p style="color:#a8a8b3; font-size:0.85rem; margin-top:3px;">Total de ${p.qtdPedidos} pedidos entregues nesta jornada.</p>
            </div>
            <span>TOTAL: R$ ${p.totalVendido.toFixed(2).replace('.', ',')}</span>
          `;
          container.appendChild(cardFechamento);
          return;
        }

        // Card de Pedido Normal
        const card = document.createElement('div');
        card.className = `card-pedido ${p.novo && abaAtual === 'ativos' ? 'novo-pedido' : ''}`;

        card.onclick = (e) => {
          if (!e.target.tagName.includes('BUTTON')) {
            p.novo = false;
            card.classList.remove('novo-pedido');
            salvarDados();
          }
        };

        const taxaVal = parseFloat(p.taxa) || 0;
        const totalVal = parseFloat(p.total) || 0;

        card.innerHTML = `
          <div>
            <div class="pedido-header">
              <span class="num-pedido">#${p.id}</span>
              <span class="hora-pedido">🕒 ${p.hora}</span>
            </div>

            <div class="cliente-info">
              <div class="cliente-nome">${p.cliente}</div>
              <div class="cliente-end">📍 ${p.endereco}</div>
              <div class="cliente-detalhes">💳 ${p.pagamento} | Taxa: R$ ${taxaVal.toFixed(2).replace('.', ',')}</div>
            </div>

            <div class="itens-lista">
              <strong>Itens:</strong><br>${p.itens}
            </div>

            ${p.obs && p.obs !== 'Nenhuma' ? `<div class="obs-box">📝 <strong>Obs:</strong> ${p.obs}</div>` : ''}
          </div>

          <div>
            <div class="financeiro-resumo">
              <span>Total do Pedido:</span>
              <span class="val-total" style="${p.status === 'cancelado' ? 'text-decoration: line-through; color: #8d8d99;' : ''}">
                R$ ${totalVal.toFixed(2).replace('.', ',')}
              </span>
            </div>

            ${abaAtual === 'ativos' ? `
              <div class="acoes-card">
                <button class="btn-concluir" onclick="concluirPedido(this, ${index})">
                  ✅ Concluir
                </button>
                <button class="btn-cancelar" onclick="cancelarPedido(this, ${index})">
                  ❌ Cancelar
                </button>
              </div>
            ` : `
              <div class="${p.status === 'cancelado' ? 'tag-cancelado' : 'tag-concluido'}">
                ${p.status === 'cancelado' ? `❌ Cancelado às ${p.horaCancelamento || ''}` : `✔️ Entregue às ${p.horaConclusao || ''}`}
              </div>
            `}
          </div>
        `;

        container.appendChild(card);

        if (p.novo && abaAtual === 'ativos') {
          setTimeout(() => {
            p.novo = false;
            card.classList.remove('novo-pedido');
            salvarDados();
          }, 30000);
        }
      });
    }

    // 6. CONFIRMAÇÃO DUPLA: CONCLUIR PEDIDO
    function concluirPedido(btn, index) {
      if (btn.classList.contains('confirmar')) {
        const pedidoConcluido = pedidosAtivos.splice(index, 1)[0];
        pedidoConcluido.horaConclusao = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        pedidoConcluido.novo = false;
        pedidoConcluido.status = 'entregue';

        historicoPedidos.unshift(pedidoConcluido);
        salvarDados();
        renderizar();
      } else {
        btn.classList.add('confirmar');
        btn.innerHTML = "⚠️ Confirmar?";

        setTimeout(() => {
          if (btn) {
            btn.classList.remove('confirmar');
            btn.innerHTML = "✅ Concluir";
          }
        }, 4000);
      }
    }

    // 7. CONFIRMAÇÃO DUPLA: CANCELAR PEDIDO
    function cancelarPedido(btn, index) {
      if (btn.classList.contains('confirmar')) {
        const pedidoCancelado = pedidosAtivos.splice(index, 1)[0];
        pedidoCancelado.horaCancelamento = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        pedidoCancelado.novo = false;
        pedidoCancelado.status = 'cancelado';

        historicoPedidos.unshift(pedidoCancelado);
        salvarDados();
        renderizar();
      } else {
        btn.classList.add('confirmar');
        btn.innerHTML = "⚠️ Cancelar?";

        setTimeout(() => {
          if (btn) {
            btn.classList.remove('confirmar');
            btn.innerHTML = "❌ Cancelar";
          }
        }, 4000);
      }
    }

    // 8. FINALIZAR TURNO
    function finalizarTurno() {
      const pedidosEntregues = historicoPedidos.filter(p => p.tipo !== 'fechamento' && p.status !== 'cancelado');
      const totalVendido = pedidosEntregues.reduce((acc, p) => acc + (parseFloat(p.total) || 0), 0);

      if (confirm(`Deseja fechar o turno atual?\n\n- Total Vendido: R$ ${totalVendido.toFixed(2)}\n- Pedidos Entregues: ${pedidosEntregues.length}`)) {
        const agora = new Date();
        const registroFechamento = {
          tipo: 'fechamento',
          data: agora.toLocaleDateString('pt-BR'),
          hora: agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          totalVendido: totalVendido,
          qtdPedidos: pedidosEntregues.length
        };

        historicoPedidos.unshift(registroFechamento);
        pedidosAtivos = [];

        salvarDados();
        mudarAba('historico');
      }
    }

    // Sincronização em tempo real (mesmo dispositivo/navegador)
    window.addEventListener('storage', () => { renderizar(); });
    setInterval(renderizar, 1500);

    renderizar();
  </script>
</body>
</html>
